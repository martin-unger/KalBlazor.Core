name: Build and publish NuGet package

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read

concurrency:
  group: nuget-release
  queue: max

jobs:
  build:
    if: github.event_name != 'push' || !startsWith(github.event.head_commit.message, 'chore(release):')
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Determine semantic version
        id: version
        run: |
          git fetch --tags --force

          LAST_TAG="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' --sort=-v:refname | head -n 1)"
          BASE_VERSION="${LAST_TAG#v}"
          if [ -z "$BASE_VERSION" ]; then
            BASE_VERSION="$(python3 - <<'PY'
          from pathlib import Path
          import re

          text = Path("src/KalBlazor.Core/KalBlazor.Core.csproj").read_text()
          print(re.search(r"<Version>([^<]+)</Version>", text).group(1))
          PY
          )"
          fi

          COMMIT_MESSAGE="$(git log -1 --pretty=%B)"
          SOURCE_BRANCH=""
          if [ "${{ github.event_name }}" = "push" ]; then
            SOURCE_BRANCH="$(curl --silent --fail \
              --header "Authorization: Bearer ${{ github.token }}" \
              --header "Accept: application/vnd.github+json" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/commits/${{ github.sha }}/pulls" \
              | jq -r '.[0].head.ref // empty')"
          fi
          if [ -z "$SOURCE_BRANCH" ]; then
            SOURCE_BRANCH="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE 's@^Merge pull request #[0-9]+ from [^/]+/(.+)$@\1@p' | head -n 1)"
          fi
          if [ -z "$SOURCE_BRANCH" ]; then
            SOURCE_BRANCH="$(printf '%s\n' "$COMMIT_MESSAGE" | sed -nE "s#^Merge branch '([^']+)'.*#\1#p" | head -n 1)"
          fi

          IFS='.' read -r MAJOR MINOR PATCH <<EOF
          $BASE_VERSION
          EOF

          case "$SOURCE_BRANCH" in
            breaking/*|breaking-*)
              MAJOR=$((MAJOR + 1))
              MINOR=0
              PATCH=0
              BUMP="major"
              ;;
            feat/*|feat-*|feature/*|feature-*)
              MINOR=$((MINOR + 1))
              PATCH=0
              BUMP="minor"
              ;;
            fix/*|fix-*|bugfix/*|bugfix-*|hotfix/*|hotfix-*|perf/*|perf-*|refactor/*|refactor-*)
              PATCH=$((PATCH + 1))
              BUMP="patch"
              ;;
            *)
              PATCH=$((PATCH + 1))
              BUMP="patch"
              ;;
          esac

          VERSION="$MAJOR.$MINOR.$PATCH"
          ASSEMBLY_VERSION="$MAJOR.$MINOR.$PATCH.0"
          echo "semver=$VERSION" >> "$GITHUB_OUTPUT"
          echo "assembly_version=$ASSEMBLY_VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "source_branch=$SOURCE_BRANCH" >> "$GITHUB_OUTPUT"
          echo "bump=$BUMP" >> "$GITHUB_OUTPUT"
          echo "Calculated version: $VERSION ($BUMP from '${SOURCE_BRANCH:-direct-main-commit}')"

      - name: Restore
        run: dotnet restore src/KalBlazor.Core/KalBlazor.Core.csproj

      - name: Build
        run: >
          dotnet build src/KalBlazor.Core/KalBlazor.Core.csproj
          --configuration Release
          --no-restore
          -p:Version=${{ steps.version.outputs.semver }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.semver }}

      - name: Test
        run: dotnet test src/SoftwareThingies.KalBlazor.Core.slnx --configuration Release --no-build --verbosity normal

      - name: Update project version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          python3 - <<'PY'
          from pathlib import Path

          project = Path("src/KalBlazor.Core/KalBlazor.Core.csproj")
          text = project.read_text()
          replacements = {
              "<Version>": "${{ steps.version.outputs.semver }}",
              "<AssemblyVersion>": "${{ steps.version.outputs.assembly_version }}",
              "<FileVersion>": "${{ steps.version.outputs.assembly_version }}",
              "<InformationalVersion>": "${{ steps.version.outputs.semver }}",
          }

          for tag, value in replacements.items():
              start = text.index(tag) + len(tag)
              end = text.index("</", start)
              text = text[:start] + value + text[end:]

          project.write_text(text)
          PY

      - name: Commit project version
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/KalBlazor.Core/KalBlazor.Core.csproj
          git commit -m "chore(release): ${{ steps.version.outputs.semver }}"
          git push origin HEAD:main

      - name: Pack
        run: >
          dotnet pack src/KalBlazor.Core/KalBlazor.Core.csproj
          --configuration Release
          --no-build
          --output ./artifacts
          -p:Version=${{ steps.version.outputs.semver }}
          -p:PackageVersion=${{ steps.version.outputs.semver }}
          -p:AssemblyVersion=${{ steps.version.outputs.assembly_version }}
          -p:FileVersion=${{ steps.version.outputs.assembly_version }}
          -p:InformationalVersion=${{ steps.version.outputs.semver }}

      - name: Upload package artifact
        uses: actions/upload-artifact@v4
        with:
          name: SoftwareThingies.KalBlazor.Core-${{ steps.version.outputs.semver }}
          path: artifacts/*.nupkg

      - name: Publish to NuGet.org
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: dotnet nuget push "artifacts/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate

      - name: Tag release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          git tag "${{ steps.version.outputs.tag }}"
          git push origin "${{ steps.version.outputs.tag }}"
